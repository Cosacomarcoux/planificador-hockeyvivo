<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planificador Semanal – Hockey Vivo</title>
<style>
:root {
  --verde: #1a7a4a;
  --verde-claro: #e8f5ee;
  --verde-borde: #b2d8c0;
  --negro: #1a1a1a;
  --gris: #6b7280;
  --gris-claro: #f4f6f4;
  --blanco: #ffffff;
  --radio: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gris-claro); color: var(--negro); min-height: 100vh; }
header { background: var(--verde); color: white; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 1.1rem; font-weight: 600; }
header span { font-size: 0.8rem; opacity: 0.75; }
.header-right { display: flex; gap: 8px; align-items: center; }
.hist-btn { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 7px; padding: 6px 12px; font-size: 13px; cursor: pointer; }
.hist-btn:hover { background: rgba(255,255,255,0.25); }
.container { max-width: 820px; margin: 0 auto; padding: 1.5rem 1rem; }
#chat-box { display: flex; flex-direction: column; gap: 14px; margin-bottom: 1rem; }
.msg { display: flex; gap: 10px; align-items: flex-start; }
.msg.user { flex-direction: row-reverse; }
.avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
.av-ai { background: var(--verde); color: white; }
.av-u { background: var(--negro); color: white; }
.bubble { max-width: 85%; padding: 11px 15px; border-radius: var(--radio); font-size: 14px; line-height: 1.65; }
.bubble.ai { background: var(--blanco); border: 1px solid var(--verde-borde); color: var(--negro); }
.bubble.user { background: var(--verde); color: white; }
.opts { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
.opt-btn { padding: 7px 13px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid var(--verde-borde); background: var(--verde-claro); color: var(--verde); font-weight: 500; transition: background 0.15s; }
.opt-btn:hover { background: var(--verde-borde); }
.opt-btn:disabled { opacity: 0.4; cursor: default; }
#input-area { display: flex; gap: 8px; align-items: flex-end; background: var(--blanco); border: 1px solid var(--verde-borde); border-radius: var(--radio); padding: 8px 10px; }
#user-input { flex: 1; resize: none; border: none; outline: none; font-size: 14px; font-family: inherit; background: transparent; color: var(--negro); min-height: 24px; max-height: 100px; line-height: 1.5; }
#send-btn { background: var(--verde); color: white; border: none; border-radius: 7px; padding: 7px 14px; font-size: 14px; cursor: pointer; font-weight: 500; white-space: nowrap; }
#send-btn:hover { background: #155e39; }
.typing { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--verde-borde); animation: blink 1.2s infinite; }
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
#reset-btn { display: block; margin: 1.5rem auto 0; background: none; border: 1px solid #ccc; color: var(--gris); border-radius: 20px; padding: 6px 16px; font-size: 13px; cursor: pointer; }
#reset-btn:hover { border-color: var(--verde); color: var(--verde); }

/* Tabla */
.plan-outer { overflow-x: auto; margin-top: 10px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 580px; }
.col-header { background: var(--verde); color: white; padding: 7px 9px; text-align: center; font-weight: 500; white-space: nowrap; }
.col-header .dia-label { display: block; font-size: 13px; margin-bottom: 4px; }
.col-header .copy-dia-btn { background: rgba(255,255,255,0.18); color: white; border: 1px solid rgba(255,255,255,0.35); border-radius: 5px; padding: 3px 8px; font-size: 11px; cursor: pointer; white-space: nowrap; }
.col-header .copy-dia-btn:hover { background: rgba(255,255,255,0.3); }
th.row-header { background: var(--verde); color: white; padding: 7px 9px; text-align: left; font-weight: 500; white-space: nowrap; font-size: 12px; }
td { padding: 6px 9px; border: 1px solid #dde8e2; vertical-align: top; line-height: 1.45; font-size: 12px; }
tr:nth-child(even) td { background: var(--verde-claro); }
td:first-child { font-weight: 600; color: var(--verde); white-space: nowrap; background: #f0faf5 !important; }
td.editable { cursor: pointer; }
td.editable:hover { background: #d4f0e2 !important; outline: 1px dashed var(--verde); }
td.editing { padding: 0 !important; }
td.editing input { width: 100%; border: none; outline: 2px solid var(--verde); padding: 6px 9px; font-size: 12px; font-family: inherit; background: #fffbe6; border-radius: 0; }

/* Acciones del plan */
.action-btns { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.action-btn { padding: 8px 14px; border-radius: var(--radio); font-size: 13px; cursor: pointer; font-weight: 500; border: 1px solid var(--verde-borde); background: var(--verde-claro); color: var(--verde); }
.action-btn:hover { background: var(--verde-borde); }
.action-btn.primary { background: var(--verde); color: white; border-color: var(--verde); }
.action-btn.primary:hover { background: #155e39; }

/* Modal historial */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--blanco); border-radius: var(--radio); padding: 1.5rem; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
.modal h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: var(--verde); }
.modal-close { float: right; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--gris); margin-top: -4px; }
.hist-item { border: 1px solid var(--verde-borde); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.hist-item-info { font-size: 13px; }
.hist-item-info strong { display: block; color: var(--negro); }
.hist-item-info span { color: var(--gris); font-size: 12px; }
.hist-item-btns { display: flex; gap: 6px; flex-shrink: 0; }
.hist-load { padding: 5px 10px; font-size: 12px; border-radius: 6px; cursor: pointer; background: var(--verde-claro); border: 1px solid var(--verde-borde); color: var(--verde); }
.hist-del { padding: 5px 8px; font-size: 12px; border-radius: 6px; cursor: pointer; background: #fee2e2; border: 1px solid #fca5a5; color: #b91c1c; }
.empty-hist { color: var(--gris); font-size: 13px; text-align: center; padding: 2rem 0; }

/* Toast */
.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--negro); color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div>
    <h1>🏑 Planificador Semanal</h1>
    <span>Hockey Vivo – Santiago del Estero</span>
  </div>
  <div class="header-right">

  "Mini Z x4 + Anticorredizo en slalom",

  "Peine doble + Amague en T"
];
const GRUPOS_SEMANA = { 1:["Core","Core","Upper","Lower","Full Body"], 2:["Upper","Upper","Lower","Full Body","Core"], 3:["Lower","Lower","Full Body","Core","Upper"], 4:["Full Body","Full Body","Core","Upper","Lower"] };
const DIAS = ["Lunes","Martes","Miércoles","Jueves","Viernes"];
const LABELS_FILA = ["Grupo","Mood","Físico 1","Físico 2","Físico 3","Físico 4","Técnico 1","Técnico 2","Espacio 1","Cabina 1","Cabina 2"];
const PREGUNTAS = [
  { key:"semana", texto:"¡Hola! Soy tu asistente de planificación de Hockey Vivo 🏑\n\n¿Qué semana del mesociclo vamos a planificar?", opts:["Semana 1","Semana 2","Semana 3","Semana 4"] },

];

let estado = { step:0, semana:null, fase:null, foco:null };
let planActual = null; // { filas: {label: [5 valores]}, titulo, fecha }

function rnd(arr, n) {
  const s=[...arr]; const r=[];
  for(let i=0;i<Math.min(n,s.length);i++){const idx=Math.floor(Math.random()*s.length);r.push(s.splice(idx,1)[0]);}
  return r;
}

function generarFilas() {
  const num = parseInt(estado.semana.replace("Semana ",""));
  const grupos = GRUPOS_SEMANA[num];
  const foco = estado.foco;
  const moods = ["Standard","Standard","EMOM","Intervalo","Dinámica media"];
  if(foco==="Más enfrentamientos") moods[4]="Enfrentamientos";
  if(foco==="Semana de descarga"){moods[0]="Dinámica corta";moods[1]="Dinámica corta";moods[2]="Dinámica corta";}
  if(foco==="Más trabajo técnico"){moods[2]="Técnica";moods[3]="Técnica";}
  if(foco==="Foco en cabina"){moods[3]="Técnica";moods[4]="EMOM";}
  const f1=[],f2=[],f3=[],f4=[];
  grupos.forEach(g=>{const pool=EJERCICIOS[g]||EJERCICIOS["Full Body"];const p=rnd(pool,4);f1.push(p[0]||"");f2.push(p[1]||"");f3.push(p[2]||"");f4.push(p[3]||"");});
  const tec=rnd(TECNICOS,10); const cab=rnd(CABINAS,10); const esp=rnd(ESPACIO1,5);
  const mostrarTec2=foco==="Más trabajo técnico";
  const t1=[],t2=[],e1=[],c1=[],c2=[];
  for(let i=0;i<5;i++){t1.push(tec[i]||"");t2.push(mostrarTec2?(tec[i+5]||""):"");e1.push(esp[i]||"");c1.push(cab[i]||"");c2.push(cab[i+5]||"");}
  return {"Grupo":grupos,"Mood":moods,"Físico 1":f1,"Físico 2":f2,"Físico 3":f3,"Físico 4":f4,"Técnico 1":t1,"Técnico 2":t2,"Espacio 1":e1,"Cabina 1":c1,"Cabina 2":c2};
}

// ---- Tabla editable ----
function renderTabla(filas) {
  let h = `<div class="plan-outer"><table><thead><tr><th class="row-header">Ejercicio / Día</th>`;
  DIAS.forEach((d,i)=>{
    h+=`<th class="col-header"><span class="dia-label">${d}</span><button class="copy-dia-btn" onclick="copiarDia(${i})">📲 Copiar día</button></th>`;
  });
  h+=`</tr></thead><tbody>`;
  LABELS_FILA.forEach(label=>{
    const vals=filas[label]||["","","","",""];
    h+=`<tr><td>${label}</td>`;
    vals.forEach((v,di)=>{
      h+=`<td class="editable" data-fila="${label}" data-dia="${di}" onclick="editarCelda(this)">${v}</td>`;
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>`;
  return h;
}

function editarCelda(td) {
  if(td.classList.contains("editing")) return;
  const valorActual = td.textContent;
  td.classList.add("editing");
  td.classList.remove("editable");
  const inp = document.createElement("input");
  inp.type = "text";
  inp.value = valorActual;
  inp.style.width = "100%";
  td.textContent = "";
  td.appendChild(inp);
  inp.focus();
  inp.select();
  const guardar = () => {
    const nuevo = inp.value.trim();
    td.classList.remove("editing");
    td.classList.add("editable");
    td.textContent = nuevo;
    td.onclick = function(){editarCelda(this);};
    // actualizar planActual
    if(planActual){
      const fila = td.dataset.fila;
      const dia = parseInt(td.dataset.dia);
      if(planActual.filas[fila]) planActual.filas[fila][dia] = nuevo;
    }
  };
  inp.addEventListener("blur", guardar);
  inp.addEventListener("keydown", e=>{ if(e.key==="Enter") inp.blur(); if(e.key==="Escape"){inp.value=valorActual;inp.blur();} });
}

// ---- Copiar día individual ----
function copiarDia(diaIdx) {
  if(!planActual) return;
  const dia = DIAS[diaIdx];
  let txt = `*🏑 Hockey Vivo – ${planActual.titulo}*\n`;
  txt += `*${dia}*\n\n`;
  LABELS_FILA.forEach(label=>{
    const val = (planActual.filas[label]||[])[diaIdx];
    if(val) txt += `• *${label}:* ${val}\n`;
  });
  navigator.clipboard.writeText(txt).then(()=>toast(`✓ ${dia} copiado para WhatsApp`));
}

// ---- Copiar tabla completa ----
function copiarTablaCompleta() {
  if(!planActual) return;
  let txt = `*🏑 ${planActual.titulo}*\nFoco: ${estado.foco}\n\n`;
  LABELS_FILA.forEach(label=>{
    txt+=`*${label}:*\n`;
    DIAS.forEach((d,i)=>{const v=(planActual.filas[label]||[])[i];if(v)txt+=`  ${d}: ${v}\n`;});
    txt+="\n";
  });
  navigator.clipboard.writeText(txt).then(()=>toast("✓ Tabla copiada para WhatsApp"));
}

// ---- Guardar plan ----
function guardarPlan() {
  if(!planActual) return;
  const planes = JSON.parse(localStorage.getItem("hv_planes")||"[]");
  const id = Date.now();
  planes.unshift({ id, titulo: planActual.titulo, fecha: planActual.fecha, semana: estado.semana, fase: estado.fase, foco: estado.foco, filas: planActual.filas });
  localStorage.setItem("hv_planes", JSON.stringify(planes));
  toast("✓ Plan guardado");
}

// ---- Historial ----
function abrirHistorial() {
  const planes = JSON.parse(localStorage.getItem("hv_planes")||"[]");
  const lista = document.getElementById("hist-lista");
  if(!planes.length){
    lista.innerHTML=`<div class="empty-hist">Todavía no guardaste ningún plan.<br>Generá uno y tocá "Guardar plan".</div>`;
  } else {
    lista.innerHTML = planes.map(p=>`
      <div class="hist-item" id="hist-${p.id}">
        <div class="hist-item-info">
          <strong>${p.titulo}</strong>
          <span>${p.fecha} · Foco: ${p.foco}</span>
        </div>
        <div class="hist-item-btns">
          <button class="hist-load" onclick="cargarPlan(${p.id})">Cargar</button>
          <button class="hist-del" onclick="borrarPlan(${p.id})">✕</button>
        </div>
      </div>`).join("");
  }
  document.getElementById("modal-hist").classList.add("open");
}

function cerrarHistorial() { document.getElementById("modal-hist").classList.remove("open"); }

function cargarPlan(id) {
  const planes = JSON.parse(localStorage.getItem("hv_planes")||"[]");
  const p = planes.find(x=>x.id===id);
  if(!p) return;
  cerrarHistorial();
  estado.semana = p.semana; estado.fase = p.fase; estado.foco = p.foco;
  planActual = { filas: p.filas, titulo: p.titulo, fecha: p.fecha };
  const box = document.getElementById("chat-box");
  box.innerHTML = "";
  const header = `<strong>${p.titulo}</strong> <small style="color:#6b7280">(cargado del historial)</small>`;
  addAIMsg(header + renderTabla(p.filas) + botonesAccion(), [], true);
}

function borrarPlan(id) {
  let planes = JSON.parse(localStorage.getItem("hv_planes")||"[]");
  planes = planes.filter(x=>x.id!==id);
  localStorage.setItem("hv_planes", JSON.stringify(planes));
  document.getElementById(`hist-${id}`)?.remove();
  const lista = document.getElementById("hist-lista");
  if(!lista.children.length) lista.innerHTML=`<div class="empty-hist">No hay planes guardados.</div>`;
}

function botonesAccion() {
  return `<div class="action-btns">
    <button class="action-btn primary" onclick="guardarPlan()">💾 Guardar plan</button>
    <button class="action-btn" onclick="copiarTablaCompleta()">📋 Copiar todo para WhatsApp</button>
  </div>`;
}

// ---- Toast ----
function toast(msg) {
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2200);
}

// ---- Chat engine ----
function addMsg(role, contenido, esHtml=false) {
  const box=document.getElementById("chat-box");
  const div=document.createElement("div"); div.className=`msg ${role}`;
  const av=document.createElement("div"); av.className=`avatar av-${role}`; av.textContent=role==="ai"?"IA":"Vos";
  const bub=document.createElement("div"); bub.className=`bubble ${role}`;
  if(esHtml) bub.innerHTML=contenido;
  else bub.textContent=contenido;
  div.appendChild(av); div.appendChild(bub);
  box.appendChild(div); box.scrollTop=box.scrollHeight;
}

function addAIMsg(texto, opts=[], esHtml=false) {
  const box=document.getElementById("chat-box");
  const div=document.createElement("div"); div.className="msg ai";
  const av=document.createElement("div"); av.className="avatar av-ai"; av.textContent="IA";
  const bub=document.createElement("div"); bub.className="bubble ai";
  if(esHtml) bub.innerHTML=texto;
  else { texto.split("\n").forEach((line,i)=>{if(i>0)bub.appendChild(document.createElement("br"));bub.appendChild(document.createTextNode(line));}); }
  if(opts.length){
    const od=document.createElement("div"); od.className="opts";
    opts.forEach(o=>{const btn=document.createElement("button");btn.className="opt-btn";btn.textContent=o;btn.onclick=()=>{deshabilitarOpts(od);handleOpt(o);};od.appendChild(btn);});
    bub.appendChild(od);
  }
  div.appendChild(av); div.appendChild(bub); box.appendChild(div); box.scrollTop=box.scrollHeight;
}

function deshabilitarOpts(container){container.querySelectorAll(".opt-btn").forEach(b=>b.disabled=true);}

function showTyping(){
  const box=document.getElementById("chat-box");
  const div=document.createElement("div");div.className="msg ai";div.id="typing";
  const av=document.createElement("div");av.className="avatar av-ai";av.textContent="IA";
  const bub=document.createElement("div");bub.className="bubble ai";
  bub.innerHTML=`<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  div.appendChild(av);div.appendChild(bub);box.appendChild(div);box.scrollTop=box.scrollHeight;
}

function removeTyping(){const t=document.getElementById("typing");if(t)t.remove();}

function handleOpt(val){addMsg("user",val);procesarRespuesta(val);}

function sendMessage(){
  const inp=document.getElementById("user-input");
  const val=inp.value.trim();if(!val)return;inp.value="";
  addMsg("user",val);procesarRespuesta(val);
}

function procesarRespuesta(val){
  const q=PREGUNTAS[estado.step];if(q)estado[q.key]=val;
  estado.step++;showTyping();
  setTimeout(()=>{
    removeTyping();
    if(estado.step<PREGUNTAS.length){
      const next=PREGUNTAS[estado.step];addAIMsg(next.texto,next.opts);
    } else {
      addAIMsg(`¡Perfecto! Generando el plan para ${estado.semana} – ${estado.fase}...`);
      setTimeout(()=>{
        const filas=generarFilas();
        const titulo=`${estado.semana} – ${estado.fase}`;
        const fecha=new Date().toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"});
        planActual={filas,titulo,fecha};
        const header=`<strong>${titulo}</strong><br><small style="color:#6b7280">Foco: ${estado.foco} · ${fecha}</small><br><small style="color:#9ca3af;font-size:11px">✏️ Tocá cualquier celda para editar</small>`;
        addAIMsg(header+renderTabla(filas)+botonesAccion(),[],true);
        setTimeout(()=>{addAIMsg("¿Querés algo más?",["Generar otra semana","Cambiar fase","Cambiar foco"]);},300);
      },600);
    }
  },800);
}

function resetChat(){
  document.getElementById("chat-box").innerHTML="";
  estado={step:0,semana:null,fase:null,foco:null};planActual=null;
  addAIMsg(PREGUNTAS[0].texto,PREGUNTAS[0].opts);
}

document.getElementById("user-input").addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}});
document.getElementById("modal-hist").addEventListener("click",e=>{if(e.target===document.getElementById("modal-hist"))cerrarHistorial();});

addAIMsg(PREGUNTAS[0].texto,PREGUNTAS[0].opts);
</script>
</body>
</html>
