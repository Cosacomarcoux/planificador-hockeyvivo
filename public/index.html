<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Planificador Semanal – Hockey Vivo</title>
<style>
:root {
  --verde: #1a7a4a;
  --verde-claro: #e8f5ee;
  --verde-borde: #b2d8c0;
  --verde-auto: #155e39;
  --verde-auto-label: #0f4a2c;
  --negro: #1a1a1a;
  --gris: #6b7280;
  --gris-claro: #f4f6f4;
  --blanco: #ffffff;
  --radio: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gris-claro); color: var(--negro); min-height: 100vh; }

/* Header */
header { background: var(--verde); color: white; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 1.1rem; font-weight: 600; }
header span { font-size: 0.8rem; opacity: 0.75; }
.header-right { display: flex; gap: 8px; align-items: center; }
.hist-btn { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 7px; padding: 6px 12px; font-size: 13px; cursor: pointer; }
.hist-btn:hover { background: rgba(255,255,255,0.25); }

/* Container y chat */
.container { max-width: 860px; margin: 0 auto; padding: 1.5rem 1rem; }
#chat-box { display: flex; flex-direction: column; gap: 14px; margin-bottom: 1rem; }
.msg { display: flex; gap: 10px; align-items: flex-start; }
.msg.user { flex-direction: row-reverse; }
.avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
.av-ai { background: var(--verde); color: white; }
.av-u { background: var(--negro); color: white; }
.bubble { max-width: 88%; padding: 11px 15px; border-radius: var(--radio); font-size: 14px; line-height: 1.65; }
.bubble.ai { background: var(--blanco); border: 1px solid var(--verde-borde); color: var(--negro); }
.bubble.user { background: var(--verde); color: white; }
.opts { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
.opt-btn { padding: 7px 13px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid var(--verde-borde); background: var(--verde-claro); color: var(--verde); font-weight: 500; transition: background 0.15s; }
.opt-btn:hover { background: var(--verde-borde); }
.opt-btn:disabled { opacity: 0.4; cursor: default; }
#input-area { display: flex; gap: 8px; align-items: flex-end; background: var(--blanco); border: 1px solid var(--verde-borde); border-radius: var(--radio); padding: 8px 10px; }
#user-input { flex: 1; resize: none; border: none; outline: none; font-size: 14px; font-family: inherit; background: transparent; color: var(--negro); min-height: 24px; max-height: 100px; line-height: 1.5; }
#send-btn { background: var(--verde); color: white; border: none; border-radius: 7px; padding: 7px 14px; font-size: 14px; cursor: pointer; font-weight: 500; white-space: nowrap; }
#send-btn:hover { background: #155e39; }
.typing { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--verde-borde); animation: blink 1.2s infinite; }
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
#reset-btn { display: block; margin: 1.5rem auto 0; background: none; border: 1px solid #ccc; color: var(--gris); border-radius: 20px; padding: 6px 16px; font-size: 13px; cursor: pointer; }
#reset-btn:hover { border-color: var(--verde); color: var(--verde); }

/* Tabla */
.plan-outer { overflow-x: auto; margin-top: 10px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 620px; }
.col-header { background: var(--verde); color: white; padding: 7px 9px; text-align: center; font-weight: 500; white-space: nowrap; }
.col-header .dia-label { display: block; font-size: 13px; margin-bottom: 4px; }
.col-header .copy-dia-btn { background: rgba(255,255,255,0.18); color: white; border: 1px solid rgba(255,255,255,0.35); border-radius: 5px; padding: 3px 8px; font-size: 11px; cursor: pointer; white-space: nowrap; }
.col-header .copy-dia-btn:hover { background: rgba(255,255,255,0.3); }
th.row-header { background: var(--verde); color: white; padding: 7px 9px; text-align: left; font-weight: 500; white-space: nowrap; font-size: 12px; min-width: 80px; }
td { padding: 6px 9px; border: 1px solid #dde8e2; vertical-align: top; line-height: 1.45; font-size: 12px; }
tr:nth-child(even) td { background: var(--verde-claro); }
td:first-child { font-weight: 600; white-space: nowrap; }

/* Filas automáticas no editables */
tr.fila-auto td { background: var(--verde-auto) !important; color: white !important; font-weight: 600; }
tr.fila-auto td:first-child { background: var(--verde-auto-label) !important; color: #a8d5b9 !important; }

/* Filas editables */
td.editable { cursor: pointer; color: var(--negro); }
td.editable:first-child { color: var(--verde); background: #f0faf5 !important; }
tr:nth-child(even) td.editable:first-child { background: #e0f5eb !important; }
td.editable:not(:first-child):hover { background: #d4f0e2 !important; outline: 1px dashed var(--verde); }
td.editing { padding: 0 !important; }
td.editing input { width: 100%; border: none; outline: 2px solid var(--verde); padding: 6px 9px; font-size: 12px; font-family: inherit; background: #fffbe6; border-radius: 0; }

/* Botones de acción */
.action-btns { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.action-btn { padding: 8px 14px; border-radius: var(--radio); font-size: 13px; cursor: pointer; font-weight: 500; border: 1px solid var(--verde-borde); background: var(--verde-claro); color: var(--verde); }
.action-btn:hover { background: var(--verde-borde); }
.action-btn.primary { background: var(--verde); color: white; border-color: var(--verde); }
.action-btn.primary:hover { background: #155e39; }

/* Modal historial */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--blanco); border-radius: var(--radio); padding: 1.5rem; max-width: 520px; width: 90%; max-height: 80vh; overflow-y: auto; }
.modal h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: var(--verde); }
.modal-close { float: right; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--gris); margin-top: -4px; }
.hist-item { border: 1px solid var(--verde-borde); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.hist-item-info { font-size: 13px; }
.hist-item-info strong { display: block; color: var(--negro); }
.hist-item-info span { color: var(--gris); font-size: 12px; }
.hist-item-btns { display: flex; gap: 6px; flex-shrink: 0; }
.hist-load { padding: 5px 10px; font-size: 12px; border-radius: 6px; cursor: pointer; background: var(--verde-claro); border: 1px solid var(--verde-borde); color: var(--verde); }
.hist-del { padding: 5px 8px; font-size: 12px; border-radius: 6px; cursor: pointer; background: #fee2e2; border: 1px solid #fca5a5; color: #b91c1c; }
.empty-hist { color: var(--gris); font-size: 13px; text-align: center; padding: 2rem 0; }

/* Toast */
.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--negro); color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200; white-space: nowrap; }
.toast.show { opacity: 1; }

/* Dropdown buscador */
#ejercicio-dropdown { position: fixed; z-index: 500; background: var(--blanco); border: 2px solid var(--verde); border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.18); min-width: 220px; display: none; }
.dropdown-header { display: flex; gap: 4px; padding: 8px 8px 4px; }
#dropdown-search { flex: 1; border: 1px solid var(--verde-borde); border-radius: 6px; padding: 6px 8px; font-size: 13px; outline: none; font-family: inherit; }
#dropdown-search:focus { border-color: var(--verde); }
.dropdown-close-btn { background: none; border: none; cursor: pointer; font-size: 16px; color: var(--gris); line-height: 1; padding: 0 2px; }
#dropdown-list { max-height: 220px; overflow-y: auto; padding: 0 8px 8px; }
.dropdown-item { padding: 6px 8px; border-radius: 5px; font-size: 12px; cursor: pointer; line-height: 1.4; }
.dropdown-item:hover { background: var(--verde-claro); color: var(--verde); }
.dropdown-empty { color: var(--gris); font-size: 12px; padding: 6px 4px; }

/* Modal banco de ejercicios */
.banco-tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 14px; }
.banco-tab { padding: 5px 10px; border: 1px solid var(--verde-borde); border-radius: 6px; font-size: 12px; cursor: pointer; background: var(--verde-claro); color: var(--verde); font-weight: 500; }
.banco-tab.active { background: var(--verde); color: white; border-color: var(--verde); }
.banco-list { max-height: 300px; overflow-y: auto; margin-bottom: 4px; }
.banco-item { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 5px 2px; border-bottom: 1px solid #f0f4f2; font-size: 12px; }
.banco-item:last-child { border-bottom: none; }
.banco-nombre { cursor: pointer; flex: 1; min-width: 0; }
.banco-nombre:hover { color: var(--verde); text-decoration: underline; }
.banco-item-btns { display: flex; gap: 3px; flex-shrink: 0; }
.banco-edit-btn { background: none; border: none; cursor: pointer; font-size: 13px; flex-shrink: 0; opacity: 0.6; }
.banco-edit-btn:hover { opacity: 1; }
.banco-del-btn { background: none; border: none; cursor: pointer; font-size: 13px; flex-shrink: 0; opacity: 0.7; }
.banco-del-btn:hover { opacity: 1; }
.banco-edit-input { flex: 1; border: 1px solid var(--verde); border-radius: 5px; padding: 4px 7px; font-size: 12px; font-family: inherit; outline: none; min-width: 0; }
.banco-confirm-btn { background: var(--verde); color: white; border: none; border-radius: 5px; padding: 4px 9px; font-size: 12px; cursor: pointer; white-space: nowrap; }
.banco-cancel-btn { background: none; border: 1px solid #ccc; border-radius: 5px; padding: 4px 7px; font-size: 12px; cursor: pointer; color: var(--gris); }
.banco-add-row { display: flex; gap: 6px; margin-top: 12px; border-top: 1px solid var(--verde-borde); padding-top: 12px; }
.banco-add-input { flex: 1; border: 1px solid var(--verde-borde); border-radius: 6px; padding: 7px 9px; font-size: 12px; outline: none; font-family: inherit; }
.banco-add-input:focus { border-color: var(--verde); }
.banco-add-btn { padding: 7px 14px; background: var(--verde); color: white; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 500; white-space: nowrap; }
.banco-add-btn:hover { background: #155e39; }

/* Modal detalle de ejercicio */
#modal-detalle { z-index: 150; }
.detalle-label { font-size: 12px; color: var(--gris); display: block; margin-bottom: 4px; font-weight: 500; }
.detalle-field { margin-bottom: 14px; }
.detalle-textarea { width: 100%; border: 1px solid var(--verde-borde); border-radius: 6px; padding: 8px; font-size: 13px; font-family: inherit; outline: none; resize: vertical; min-height: 70px; }
.detalle-textarea:focus { border-color: var(--verde); }
.detalle-url-input { width: 100%; border: 1px solid var(--verde-borde); border-radius: 6px; padding: 8px; font-size: 13px; font-family: inherit; outline: none; }
.detalle-url-input:focus { border-color: var(--verde); }
.detalle-video { margin-top: 10px; border-radius: 6px; overflow: hidden; }
.detalle-video iframe { display: block; border: none; border-radius: 6px; }
.detalle-btns { display: flex; gap: 8px; margin-top: 16px; }
.detalle-save { padding: 8px 18px; background: var(--verde); color: white; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 500; }
.detalle-save:hover { background: #155e39; }
.detalle-close-btn { padding: 8px 14px; background: none; border: 1px solid var(--verde-borde); border-radius: 6px; font-size: 13px; cursor: pointer; color: var(--gris); }

/* Área de impresión */
#print-area { display: none; }
@page { size: landscape; margin: 1cm; }
@media print {
  body > *:not(#print-area) { display: none !important; }
  #print-area { display: block !important; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  #print-area h2 { font-size: 13px; font-weight: 700; margin-bottom: 3px; color: #000; }
  #print-area p  { font-size: 10px; color: #555; margin-bottom: 10px; }
  #print-area table { width: 100%; border-collapse: collapse; font-size: 10px; }
  #print-area th, #print-area td { border: 1px solid #555 !important; padding: 5px 7px !important; background: white !important; color: black !important; vertical-align: top; line-height: 1.4; }
  #print-area th { font-weight: 700; background: #eee !important; text-align: center; }
  #print-area td:first-child { font-weight: 700; white-space: nowrap; }
}
</style>

<header>

    <button class="hist-btn" onclick="abrirBanco()">⚙️ Banco</button>

  </div>
</header>

<div class="container">
  <div id="chat-box"></div>
  <div id="input-area">
    <textarea id="user-input" placeholder="Escribí tu respuesta..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">Enviar ↗</button>
  </div>
  <button id="reset-btn" onclick="resetChat()">↺ Nueva planificación</button>
</div>

<div class="modal-overlay" id="modal-hist">
  <div class="modal">
    <button class="modal-close" onclick="cerrarHistorial()">✕</button>
    <h2>📂 Planes guardados</h2>
    <div id="hist-lista"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-banco">

</div>

<div id="ejercicio-dropdown">

</div>

<div class="modal-overlay" id="modal-detalle">

    <button class="modal-close" onclick="cerrarDetalle()">✕</button>
    <h2 id="detalle-nombre-titulo" style="word-break:break-word;"></h2>

    </div>

      <label class="detalle-label">Video de YouTube:</label>

    </div>
    <div class="detalle-video" id="detalle-video-container"></div>
    <div class="detalle-btns">
      <button class="detalle-save" onclick="_guardarDetalle()">Guardar</button>
      <button class="detalle-close-btn" onclick="cerrarDetalle()">Cerrar</button>
    </div>
  </div>
</div>

<div id="print-area"></div>

let estado = { step: 0, semana: null, fase: null, foco: null };

// ─── UTILIDADES ──────────────────────────────────────────────────────────────
function rnd(arr, n) {
  const s = [...arr];
  const r = [];
  for (let i = 0; i < Math.min(n, s.length); i++) {
    const idx = Math.floor(Math.random() * s.length);
    r.push(s.splice(idx, 1)[0]);
  }
  return r;
}

// Retorna el banco efectivo: base + extras localStorage - eliminados localStorage
// hv_banco_eliminados es un objeto { key: [nombres] } (por banco)
function getBancoEfectivo(key) {
  const eliminadosRaw = JSON.parse(localStorage.getItem("hv_banco_eliminados") || "{}");
  // Compatibilidad con formato viejo (array global): ignorarlo
  const eliminados = Array.isArray(eliminadosRaw) ? [] : (eliminadosRaw[key] || []);
  const extra = JSON.parse(localStorage.getItem("hv_banco_extra") || "{}");
  let base = [];
  if (EJERCICIOS[key])                             base = [...EJERCICIOS[key]];
  else if (key === "Técnicos")                     base = [...TECNICOS];
  else if (key === "Espacio 1")                    base = [...ESPACIO1];
  else if (key === "Cabina 1") base = [...CABINAS_1];
  else if (key === "Cabina 2") base = [...CABINAS_2];
  const extras = extra[key] || [];
  return [...base, ...extras].filter(e => !eliminados.includes(e));
}

// Retorna el banco correcto según la fila y el día
function getBancoParaFila(label, diaIdx) {
  if (label.startsWith("Físico")) {
    const grupo = planActual?.filas?.["Grupo"]?.[diaIdx] || "Full Body";
    return getBancoEfectivo(grupo);
  }
  if (label.startsWith("Técnico")) return getBancoEfectivo("Técnicos");
  if (label === "Espacio 1")       return getBancoEfectivo("Espacio 1");
  if (label === "Cabina 1")        return getBancoEfectivo("Cabina 1");
  if (label === "Cabina 2")        return getBancoEfectivo("Cabina 2");
  return [];
}

// ─── GENERACIÓN DEL PLAN ─────────────────────────────────────────────────────
function generarFilas() {
  const num = parseInt(estado.semana.replace("Semana ", ""));
  const grupos = GRUPOS_SEMANA[num];
  const tts    = TT_SEMANA[num];
  const moods  = tts.map(tt => tt === "Enfrentamientos" ? "EMOM" : "INTERVALO");

  const f1=[], f2=[], f3=[], f4=[];
  const t1=[], t2=[], e1=[], c1=[], c2=[];

  // Espacio 1: 5 únicos para la semana
  const espSem = rnd(getBancoEfectivo("Espacio 1"), 5);

  for (let i = 0; i < 5; i++) {
    // Físicos: 4 únicos del grupo del día
    const fis = rnd(getBancoEfectivo(grupos[i]), 4);
    f1.push(fis[0]||""); f2.push(fis[1]||""); f3.push(fis[2]||""); f4.push(fis[3]||"");

    // Técnicos: 2 únicos por día
    const tec = rnd(getBancoEfectivo("Técnicos"), 2);
    t1.push(tec[0]||""); t2.push(tec[1]||"");

    // Espacio 1
    e1.push(espSem[i]||"");

    // Cabinas: 1 de cada banco (Cabina 1 y Cabina 2), sin repetir en el mismo día
    const bancoCab1 = getBancoEfectivo("Cabina 1");
    const selCab1   = rnd(bancoCab1, 1);
    const bancoCab2Sin = getBancoEfectivo("Cabina 2").filter(c => c !== (selCab1[0] || ""));
    const selCab2   = rnd(bancoCab2Sin.length ? bancoCab2Sin : getBancoEfectivo("Cabina 2"), 1);
    c1.push(selCab1[0]||""); c2.push(selCab2[0]||"");
  }

  return {
    "Grupo":    grupos,
    "T.T.":     tts,
    "Mood":     moods,
    "Físico 1": f1,
    "Físico 2": f2,
    "Físico 3": f3,
    "Físico 4": f4,
    "Técnico 1":t1,
    "Técnico 2":t2,
    "Espacio 1":e1,
    "Cabina 1": c1,
    "Cabina 2": c2
  };
}

// ─── TABLA ───────────────────────────────────────────────────────────────────
function renderTabla(filas) {
  let h = `<div class="plan-outer"><table><thead><tr><th class="row-header">Fila / Día</th>`;
  DIAS.forEach((d, i) => {
    h += `<th class="col-header"><span class="dia-label">${d}</span><button class="copy-dia-btn" onclick="copiarDia(${i})">📲 Copiar día</button></th>`;
  });
  h += `</tr></thead><tbody>`;

  LABELS_FILA.forEach(label => {
    const vals = filas[label] || ["","","","",""];
    const esAuto = FILAS_AUTO.has(label);
    h += `<tr${esAuto ? ' class="fila-auto"' : ''}><td>${label}</td>`;
    vals.forEach((v, di) => {
      if (esAuto) {
        h += `<td>${v}</td>`;
      } else {
        h += `<td class="editable" data-fila="${label}" data-dia="${di}" onclick="editarCelda(this)">${v}</td>`;
      }
    });
    h += `</tr>`;
  });

  h += `</tbody></table></div>`;
  return h;
}

let _dropdownTd = null;

function editarCelda(td) {
  const fila  = td.dataset.fila;
  const dia   = parseInt(td.dataset.dia);
  const banco = getBancoParaFila(fila, dia);

  _dropdownTd = td;
  const panel  = document.getElementById("ejercicio-dropdown");
  const search = document.getElementById("dropdown-search");
  const lista  = document.getElementById("dropdown-list");

  // Posición debajo de la celda
  const rect = td.getBoundingClientRect();
  panel.style.top   = (rect.bottom + 4) + "px";
  panel.style.left  = rect.left + "px";
  panel.style.width = Math.max(240, rect.width) + "px";
  panel.style.display = "block";

  search.value = "";
  _renderDropdownList(banco, "");
  search.focus();

  search.oninput = () => _renderDropdownList(banco, search.value);

  // mousedown se dispara ANTES del blur del input, evitando que el panel
  // se cierre antes de registrar la selección. También evita el bug de
  // comillas dobles en onclick usando event delegation + data-nombre.
  lista.onmousedown = ev => {
    const item = ev.target.closest(".dropdown-item");
    if (!item) return;
    ev.preventDefault(); // evitar blur en el search
    _seleccionarEjercicio(item.dataset.nombre);
  };
}

function _renderDropdownList(banco, filtro) {
  const lista = document.getElementById("dropdown-list");
  const f = filtro.toLowerCase().trim();
  const filtered = f ? banco.filter(e => e.toLowerCase().includes(f)) : banco;
  if (!filtered.length) {
    lista.innerHTML = `<div class="dropdown-empty">Sin resultados</div>`;
    return;
  }
  // data-nombre en vez de onclick para evitar conflicto de comillas en el atributo HTML
  lista.innerHTML = filtered.map(e =>
    `<div class="dropdown-item" data-nombre="${_attr(e)}">${e}</div>`
  ).join("");
}

function _seleccionarEjercicio(nombre) {
  if (!_dropdownTd) return;
  const fila = _dropdownTd.dataset.fila;
  const dia  = parseInt(_dropdownTd.dataset.dia);
  _dropdownTd.textContent = nombre;
  if (planActual && planActual.filas[fila]) planActual.filas[fila][dia] = nombre;
  cerrarDropdown();
}

function cerrarDropdown() {
  document.getElementById("ejercicio-dropdown").style.display = "none";
  _dropdownTd = null;
}

// ─── COPIAR DÍA ──────────────────────────────────────────────────────────────
function copiarDia(diaIdx) {
  if (!planActual) return;
  const dia = DIAS[diaIdx];
  let txt = `*🏑 Hockey Vivo – ${planActual.titulo}*\n*${dia}*\n\n`;
  LABELS_FILA.forEach(label => {
    const val = (planActual.filas[label] || [])[diaIdx];
    if (val) txt += `• *${label}:* ${val}\n`;
  });
  navigator.clipboard.writeText(txt).then(() => toast(`✓ ${dia} copiado para WhatsApp`));
}

// ─── COPIAR TODO ─────────────────────────────────────────────────────────────
function copiarTablaCompleta() {
  if (!planActual) return;
  let txt = `*🏑 ${planActual.titulo}*\nFoco: ${estado.foco}\n\n`;
  LABELS_FILA.forEach(label => {
    txt += `*${label}:*\n`;
    DIAS.forEach((d, i) => {
      const v = (planActual.filas[label] || [])[i];
      if (v) txt += `  ${d}: ${v}\n`;
    });
    txt += "\n";
  });
  navigator.clipboard.writeText(txt).then(() => toast("✓ Tabla completa copiada para WhatsApp"));
}

// ─── GUARDAR PLAN ────────────────────────────────────────────────────────────
function guardarPlan() {
  if (!planActual) return;
  const planes = JSON.parse(localStorage.getItem("hv_planes") || "[]");
  const id = Date.now();
  planes.unshift({
    id,
    titulo: planActual.titulo,
    fecha:  planActual.fecha,
    semana: estado.semana,
    fase:   estado.fase,
    foco:   estado.foco,
    filas:  planActual.filas
  });
  localStorage.setItem("hv_planes", JSON.stringify(planes));
  toast("✓ Plan guardado");
}

// ─── HISTORIAL ───────────────────────────────────────────────────────────────
function abrirHistorial() {
  const planes = JSON.parse(localStorage.getItem("hv_planes") || "[]");
  const lista  = document.getElementById("hist-lista");
  if (!planes.length) {
    lista.innerHTML = `<div class="empty-hist">Todavía no guardaste ningún plan.<br>Generá uno y tocá "Guardar plan".</div>`;
  } else {
    lista.innerHTML = planes.map(p => `
      <div class="hist-item" id="hist-${p.id}">
        <div class="hist-item-info">
          <strong>${p.titulo}</strong>
          <span>${p.fecha} · Foco: ${p.foco}</span>
        </div>
        <div class="hist-item-btns">
          <button class="hist-load" onclick="cargarPlan(${p.id})">Cargar</button>
          <button class="hist-del"  onclick="borrarPlan(${p.id})">✕</button>
        </div>
      </div>`).join("");
  }
  document.getElementById("modal-hist").classList.add("open");
}

function cerrarHistorial() {
  document.getElementById("modal-hist").classList.remove("open");
}

function cargarPlan(id) {
  const planes = JSON.parse(localStorage.getItem("hv_planes") || "[]");
  const p = planes.find(x => x.id === id);
  if (!p) return;
  cerrarHistorial();
  estado.semana = p.semana;
  estado.fase   = p.fase;
  estado.foco   = p.foco;
  planActual = { filas: p.filas, titulo: p.titulo, fecha: p.fecha };
  const box = document.getElementById("chat-box");
  box.innerHTML = "";
  const header = `<strong>${p.titulo}</strong> <small style="color:#6b7280">(cargado del historial)</small>`;
  addAIMsg(header + renderTabla(p.filas) + botonesAccion(), [], true);
}

function borrarPlan(id) {
  let planes = JSON.parse(localStorage.getItem("hv_planes") || "[]");
  planes = planes.filter(x => x.id !== id);
  localStorage.setItem("hv_planes", JSON.stringify(planes));
  document.getElementById(`hist-${id}`)?.remove();
  const lista = document.getElementById("hist-lista");
  if (!lista.children.length) lista.innerHTML = `<div class="empty-hist">No hay planes guardados.</div>`;
}

function botonesAccion() {
  return `<div class="action-btns">
    <button class="action-btn primary" onclick="guardarPlan()">💾 Guardar plan</button>
    <button class="action-btn" onclick="copiarTablaCompleta()">📋 Copiar todo para WhatsApp</button>

// ─── EXPORTAR PDF ─────────────────────────────────────────────────────────────
function exportarPDF() {
  if (!planActual) { toast("Primero generá o cargá un plan"); return; }
  const tabla = document.querySelector(".plan-outer table");
  if (!tabla) { toast("No hay tabla para exportar"); return; }

// ─── TOAST ───────────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

// ─── CHAT ENGINE ─────────────────────────────────────────────────────────────
function addMsg(role, contenido, esHtml=false) {
  const box = document.getElementById("chat-box");
  const div = document.createElement("div"); div.className = `msg ${role}`;
  const av  = document.createElement("div"); av.className  = `avatar av-${role}`; av.textContent = role === "ai" ? "IA" : "Vos";
  const bub = document.createElement("div"); bub.className = `bubble ${role}`;
  if (esHtml) bub.innerHTML = contenido;
  else bub.textContent = contenido;
  div.appendChild(av); div.appendChild(bub);
  box.appendChild(div); box.scrollTop = box.scrollHeight;
}

function addAIMsg(texto, opts=[], esHtml=false) {
  const box = document.getElementById("chat-box");
  const div = document.createElement("div"); div.className = "msg ai";
  const av  = document.createElement("div"); av.className  = "avatar av-ai"; av.textContent = "IA";
  const bub = document.createElement("div"); bub.className = "bubble ai";

  if (esHtml) {
    bub.innerHTML = texto;
  } else {
    texto.split("\n").forEach((line, i) => {
      if (i > 0) bub.appendChild(document.createElement("br"));
      bub.appendChild(document.createTextNode(line));
    });
  }

  if (opts.length) {
    const od = document.createElement("div"); od.className = "opts";
    opts.forEach(o => {
      const btn = document.createElement("button");
      btn.className = "opt-btn";
      btn.textContent = o;
      btn.onclick = () => { deshabilitarOpts(od); handleOpt(o); };
      od.appendChild(btn);
    });
    bub.appendChild(od);
  }

  div.appendChild(av); div.appendChild(bub);
  box.appendChild(div); box.scrollTop = box.scrollHeight;
}

function deshabilitarOpts(container) {
  container.querySelectorAll(".opt-btn").forEach(b => b.disabled = true);
}

function showTyping() {
  const box = document.getElementById("chat-box");
  const div = document.createElement("div"); div.className = "msg ai"; div.id = "typing";
  const av  = document.createElement("div"); av.className  = "avatar av-ai"; av.textContent = "IA";
  const bub = document.createElement("div"); bub.className = "bubble ai";
  bub.innerHTML = `<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  div.appendChild(av); div.appendChild(bub);
  box.appendChild(div); box.scrollTop = box.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

function handleOpt(val) { addMsg("user", val); procesarRespuesta(val); }

function sendMessage() {
  const inp = document.getElementById("user-input");
  const val = inp.value.trim();
  if (!val) return;
  inp.value = "";
  addMsg("user", val);
  procesarRespuesta(val);
}

function procesarRespuesta(val) {
  const q = PREGUNTAS[estado.step];
  if (q) estado[q.key] = val;
  estado.step++;
  showTyping();

  setTimeout(() => {
    removeTyping();
    if (estado.step < PREGUNTAS.length) {
      const next = PREGUNTAS[estado.step];
      addAIMsg(next.texto, next.opts);
    } else {
      addAIMsg(`¡Perfecto! Generando el plan para ${estado.semana} – ${estado.fase}...`);
      setTimeout(() => {
        const filas  = generarFilas();
        const titulo = `${estado.semana} – ${estado.fase}`;
        const fecha  = new Date().toLocaleDateString("es-AR", { day: "2-digit", month: "2-digit", year: "numeric" });
        planActual   = { filas, titulo, fecha };
        const header = `<strong>${titulo}</strong><br><small style="color:#6b7280">Foco: ${estado.foco} · ${fecha}</small><br><small style="color:#9ca3af;font-size:11px">✏️ Tocá cualquier celda (excepto las verdes) para editar</small>`;
        addAIMsg(header + renderTabla(filas) + botonesAccion(), [], true);
        setTimeout(() => { addAIMsg("¿Querés algo más?", ["Generar otra semana","Cambiar fase","Cambiar foco"]); }, 300);
      }, 600);
    }
  }, 800);
}

function resetChat() {
  document.getElementById("chat-box").innerHTML = "";
  estado = { step: 0, semana: null, fase: null, foco: null };
  planActual = null;
  addAIMsg(PREGUNTAS[0].texto, PREGUNTAS[0].opts);
}

const BANCO_TABS = ["Core","Upper","Lower","Full Body","Técnicos","Espacio 1","Cabina 1","Cabina 2"];
let _bancoTabActual = "Core";

function abrirBanco() {
  _bancoTabActual = "Core";
  _renderBancoTabs();
  _renderBancoContenido(_bancoTabActual);
  document.getElementById("modal-banco").classList.add("open");
}

function cerrarBanco() {
  document.getElementById("modal-banco").classList.remove("open");
}

function _renderBancoTabs() {
  // IMPORTANTE: usar comillas simples en onclick para evitar conflicto con el atributo HTML
  document.getElementById("banco-tabs").innerHTML = BANCO_TABS.map(t =>
    `<button class="banco-tab${t === _bancoTabActual ? ' active' : ''}" onclick="_cambiarBancoTab('${t}')">${t}</button>`
  ).join("");
}

function _cambiarBancoTab(key) {
  _bancoTabActual = key;
  _renderBancoTabs();
  _renderBancoContenido(key);
}

// Escapa una cadena para usarla en atributos HTML
function _attr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

function _renderBancoContenido(key) {
  const banco = getBancoEfectivo(key);
  let html = `<div class="banco-list" id="banco-list">`;
  if (!banco.length) {
    html += `<div style="color:var(--gris);font-size:13px;padding:1rem 0;text-align:center;">No hay ejercicios en este banco.</div>`;
  } else {
    banco.forEach(e => {
      html += `<div class="banco-item" data-key="${_attr(key)}" data-nombre="${_attr(e)}">
        <span class="banco-nombre">${e}</span>
        <div class="banco-item-btns">
          <button class="banco-edit-btn" title="Editar">✏️</button>
          <button class="banco-del-btn" title="Eliminar">🗑️</button>
        </div>
      </div>`;
    });
  }
  html += `</div>
  <div class="banco-add-row">
    <input class="banco-add-input" id="banco-add-input" type="text" placeholder="Nombre del ejercicio nuevo...">
    <button class="banco-add-btn" id="banco-add-btn">Agregar</button>
  </div>`;
  document.getElementById("banco-contenido").innerHTML = html;

  // Event delegation para la lista
  const lista = document.getElementById("banco-list");
  if (lista) {
    lista.addEventListener("click", ev => {
      const item = ev.target.closest(".banco-item");
      if (!item) return;
      const itemKey    = item.dataset.key;
      const itemNombre = item.dataset.nombre;
      if (ev.target.classList.contains("banco-del-btn"))  _eliminarEjercicio(itemKey, itemNombre);
      else if (ev.target.classList.contains("banco-edit-btn")) _editarEjercicio(item, itemKey, itemNombre);
      else if (ev.target.classList.contains("banco-nombre"))   abrirDetalleEjercicio(itemNombre);
    });
  }

  document.getElementById("banco-add-btn")?.addEventListener("click", () => _agregarEjercicio(key));
  document.getElementById("banco-add-input")?.addEventListener("keydown", ev => { if (ev.key === "Enter") _agregarEjercicio(key); });
}

function _baseParaKey(key) {
  if (EJERCICIOS[key])      return EJERCICIOS[key];
  if (key === "Técnicos")   return TECNICOS;
  if (key === "Espacio 1")  return ESPACIO1;
  if (key === "Cabina 1")   return CABINAS_1;
  if (key === "Cabina 2")   return CABINAS_2;
  return [];
}

function _eliminarEjercicio(key, nombre) {
  if (!confirm(`¿Eliminás este ejercicio?\n"${nombre}"`)) return;
  if (_baseParaKey(key).includes(nombre)) {
    // Ejercicio del banco base: guardarlo en hv_banco_eliminados por key
    const raw = JSON.parse(localStorage.getItem("hv_banco_eliminados") || "{}");
    const elim = Array.isArray(raw) ? {} : raw;
    if (!elim[key]) elim[key] = [];
    if (!elim[key].includes(nombre)) elim[key].push(nombre);
    localStorage.setItem("hv_banco_eliminados", JSON.stringify(elim));
  } else {
    // Ejercicio extra: quitarlo del array de extras
    const extra = JSON.parse(localStorage.getItem("hv_banco_extra") || "{}");
    extra[key] = (extra[key] || []).filter(e => e !== nombre);
    localStorage.setItem("hv_banco_extra", JSON.stringify(extra));
  }
  _renderBancoContenido(key);
}

function _agregarEjercicio(key) {
  const inp = document.getElementById("banco-add-input");
  const nombre = inp?.value.trim();
  if (!nombre) return;
  const extra = JSON.parse(localStorage.getItem("hv_banco_extra") || "{}");
  if (!extra[key]) extra[key] = [];
  if (!extra[key].includes(nombre)) { extra[key].push(nombre); localStorage.setItem("hv_banco_extra", JSON.stringify(extra)); }
  inp.value = "";
  _renderBancoContenido(key);
  toast(`✓ "${nombre}" agregado a ${key}`);
}

// ─── EDICIÓN INLINE DE EJERCICIOS ────────────────────────────────────────────
function _editarEjercicio(item, key, nombreViejo) {
  item.innerHTML = `
    <input class="banco-edit-input" type="text" value="${_attr(nombreViejo)}">
    <div class="banco-item-btns">
      <button class="banco-confirm-btn" title="Confirmar">✓</button>
      <button class="banco-cancel-btn" title="Cancelar">✕</button>
    </div>`;
  const inp = item.querySelector(".banco-edit-input");
  inp.focus(); inp.select();
  item.querySelector(".banco-confirm-btn").onclick = () => {
    const nuevoNombre = inp.value.trim();
    if (!nuevoNombre || nuevoNombre === nombreViejo) { _cancelarEdicion(item, key, nombreViejo); return; }
    _confirmarEdicion(key, nombreViejo, nuevoNombre);
  };
  item.querySelector(".banco-cancel-btn").onclick = () => _cancelarEdicion(item, key, nombreViejo);
  inp.addEventListener("keydown", ev => {
    if (ev.key === "Enter")  item.querySelector(".banco-confirm-btn").click();
    if (ev.key === "Escape") _cancelarEdicion(item, key, nombreViejo);
  });
}

function _cancelarEdicion(item, key, nombreViejo) {
  item.dataset.nombre = nombreViejo;
  item.innerHTML = `
    <span class="banco-nombre">${nombreViejo}</span>
    <div class="banco-item-btns">
      <button class="banco-edit-btn" title="Editar">✏️</button>
      <button class="banco-del-btn" title="Eliminar">🗑️</button>
    </div>`;
}

function _confirmarEdicion(key, nombreViejo, nuevoNombre) {
  const raw    = JSON.parse(localStorage.getItem("hv_banco_eliminados") || "{}");
  const elim   = Array.isArray(raw) ? {} : raw;
  const extra  = JSON.parse(localStorage.getItem("hv_banco_extra") || "{}");
  if (_baseParaKey(key).includes(nombreViejo)) {
    // Ejercicio base: marcarlo como eliminado y agregar el nuevo nombre a extras
    if (!elim[key]) elim[key] = [];
    if (!elim[key].includes(nombreViejo)) elim[key].push(nombreViejo);
    localStorage.setItem("hv_banco_eliminados", JSON.stringify(elim));
    if (!extra[key]) extra[key] = [];
    if (!extra[key].includes(nuevoNombre)) extra[key].push(nuevoNombre);
  } else {
    // Ejercicio extra: renombrarlo en el array
    extra[key] = (extra[key] || []).map(e => e === nombreViejo ? nuevoNombre : e);
  }
  localStorage.setItem("hv_banco_extra", JSON.stringify(extra));
  // Migrar detalle al nuevo nombre si existe
  const detalles = JSON.parse(localStorage.getItem("hv_ejercicio_detalle") || "{}");
  if (detalles[nombreViejo]) { detalles[nuevoNombre] = detalles[nombreViejo]; delete detalles[nombreViejo]; localStorage.setItem("hv_ejercicio_detalle", JSON.stringify(detalles)); }
  toast("✓ Ejercicio renombrado");
  _renderBancoContenido(key);
}

// ─── DETALLE DE EJERCICIO (DESCRIPCIÓN + VIDEO) ───────────────────────────────
let _detalleNombreActual = null;

function abrirDetalleEjercicio(nombre) {
  _detalleNombreActual = nombre;
  const detalles = JSON.parse(localStorage.getItem("hv_ejercicio_detalle") || "{}");
  const d = detalles[nombre] || {};
  document.getElementById("detalle-nombre-titulo").textContent = nombre;
  document.getElementById("detalle-desc").value = d.descripcion || "";
  const ytInp = document.getElementById("detalle-yt");
  ytInp.value = d.youtube || "";
  _actualizarVideoEmbed(d.youtube || "");
  ytInp.oninput = () => _actualizarVideoEmbed(ytInp.value);
  document.getElementById("modal-detalle").classList.add("open");
}

function cerrarDetalle() {
  document.getElementById("modal-detalle").classList.remove("open");
  _detalleNombreActual = null;
}

function _extraerYouTubeId(url) {
  if (!url) return null;
  let m = url.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  m = url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  m = url.match(/\/embed\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  return null;
}

function _actualizarVideoEmbed(url) {
  const cont = document.getElementById("detalle-video-container");
  const id = _extraerYouTubeId(url.trim());
  cont.innerHTML = id
    ? `<iframe width="100%" height="200" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe>`
    : "";
}

function _guardarDetalle() {
  if (!_detalleNombreActual) return;
  const detalles = JSON.parse(localStorage.getItem("hv_ejercicio_detalle") || "{}");
  detalles[_detalleNombreActual] = {
    descripcion: document.getElementById("detalle-desc").value.trim(),
    youtube:     document.getElementById("detalle-yt").value.trim()
  };
  localStorage.setItem("hv_ejercicio_detalle", JSON.stringify(detalles));
  toast("✓ Detalle guardado");
  cerrarDetalle();
}

// ─── INICIALIZACIÓN ──────────────────────────────────────────────────────────
document.getElementById("user-input").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById("modal-hist").addEventListener("click", e => {
  if (e.target === document.getElementById("modal-hist")) cerrarHistorial();
});
document.getElementById("modal-banco").addEventListener("click", e => {
  if (e.target === document.getElementById("modal-banco")) cerrarBanco();
});
document.getElementById("modal-detalle").addEventListener("click", e => {
  if (e.target === document.getElementById("modal-detalle")) cerrarDetalle();
});
document.addEventListener("click", e => {
  const panel = document.getElementById("ejercicio-dropdown");
  if (panel.style.display === "none") return;
  if (!panel.contains(e.target) && e.target !== _dropdownTd && !_dropdownTd?.contains(e.target)) cerrarDropdown();
});

addAIMsg(PREGUNTAS[0].texto, PREGUNTAS[0].opts);
</script>
